name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  BUILD_NUMBER: 1
  BUILD_VERSION: 1.0.0
  PYTHON_VERSION: '3.11'
  FLUTTER_VERSION: '3.24.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet pillow arabic-reshaper python-bidi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'
    
    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Accept Android licenses
      run: |
        yes | flutter doctor --android-licenses || true
    
    - name: Verify Flutter installation
      run: |
        flutter doctor
        flutter --version
    
    - name: Build APK with Flet Pack
      run: |
        flet pack main.py \
          --name "غانم سوفت" \
          --package-name com.ghanemsoft.invoice \
          --product-name "نظام الفواتير" \
          --description "نظام فواتير مع دعم الطباعة الحرارية" \
          --author "غانم سوفت" \
          --version "1.0.0" \
          --add-package pillow \
          --add-package arabic-reshaper \
          --add-package python-bidi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ghanemsoft-invoice
        path: dist/*.apk
