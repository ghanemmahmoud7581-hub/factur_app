name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install flet pillow arabic-reshaper python-bidi
    
    - name: Build APK
      run: |
        flet pack main.py \
          --name "غانم سوفت" \
          --package-name com.ghanemsoft.invoice \
          --add-package pillow \
          --add-package arabic-reshaper \
          --add-package python-bidi
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: ghanemsoft-invoice
        path: dist/*.apk