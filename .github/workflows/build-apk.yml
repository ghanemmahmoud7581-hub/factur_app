name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.27.4'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Flet CLI
      run: |
        pip install flet

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Accept Android licenses
      run: |
        yes | flutter doctor --android-licenses || true

    - name: Build Android APK
      run: |
        flet build apk \
          --project "غانم سوفت" \
          --include-packages flet_audio \
          --no-rich-output
      # pillow, arabic-reshaper, python-bidi are pure Python packages.
      # List them in requirements.txt in your repo root instead of passing
      # them as flags — flet build apk picks them up automatically.

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ghanemsoft-invoice
        path: build/apk/app-release.apk
