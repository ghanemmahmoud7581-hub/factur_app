name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.5'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # إصلاح تحذير Node.js

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Flet CLI
      run: pip install flet==0.82.2

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        channel: 'stable'

    - name: Verify Flutter version
      run: flutter --version

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses || true

    - name: Build Android APK
      run: echo "y" | flet build apk --project "ghanem-soft" -v

    # نبحث عن ملف APK أينما كان بعد البناء
    - name: Find APK file
      run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ghanemsoft-invoice
        path: |
          build/apk/**/*.apk
          **/*.apk
        if-no-files-found: warn
